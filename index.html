<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kakao Map Project</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="keyword" placeholder="장소를 입력하세요" onkeypress="if(event.keyCode==13) searchPlaces()">
                <button onclick="searchPlaces()">검색</button>
            </div>
            <ul id="places-list">
                </ul>
        </div>

        <div id="map"></div>
    </div>

    <script type="text/javascript" src="//dapi.kakao.com/v2/maps/sdk.js?appkey=7490b166b2c8e7d58f70868cc57afb6a&libraries=services&autoload=false"></script>
    <script src="script.js"></script>
</body>
</html>
